<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash No Pix - Upsell 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .video-container {
            position: relative;
            padding: 20px;
            background: #000;
        }
        #vsl-player {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            display: block;
        }
        .content {
            padding: 40px 30px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .highlight {
            color: #667eea;
            font-weight: bold;
        }
        p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 20px 60px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: none;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
        .price {
            font-size: 48px;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }
        .price-old {
            text-decoration: line-through;
            color: #999;
            font-size: 24px;
            margin-right: 10px;
        }
    </style>
    
    <!-- Utmify Tracking -->
    <link rel="preload" href="https://cdn.utmify.com.br/scripts/utms/latest.js" as="script">
    <script>
      window.pixelId = "69083169bcebef921e6ed8a1";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
    
    <!-- Facebook Pixel -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '3959699630937334');
    fbq('track', 'PageView');
    fbq('track', 'ViewContent', {
      content_name: 'cashnopix',
      value: 197.0,
      currency: 'BRL'
    });
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=3959699630937334&ev=PageView&noscript=1"
    /></noscript>
</head>
<body>
    <div class="container">
        <div class="video-container">
            <div id="vsl-player"></div>
        </div>
        <div class="content">
            <h1>🎁 <span class="highlight">OFERTA ESPECIAL</span> 🎁</h1>
            <p>Aproveite essa oportunidade única de turbinar seus resultados!</p>
            
            <div class="price">
                <span class="price-old">R$ 397</span>
                <span>R$ 197</span>
            </div>
            
            <button class="cta-button" id="checkout-btn">
                QUERO APROVEITAR AGORA!
            </button>
        </div>
    </div>

    <!-- VSL Script -->
    <script src="https://scripts.converteai.net/2e8fc70c-53af-4f29-af7e-e4d40fc994f9/players/68cd7140713fc4a5132560c0/v4/player.js"></script>
    
    <!-- Utmify UTMs -->
    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js"></script>
    
    <!-- Checkout Script -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      const checkoutUrl = 'https://pay.kirvano.site/56efd6fc-55cb-4a1f-95a3-50c1de6e2c1d';
      const checkoutBtn = document.getElementById('checkout-btn');
      
      if (checkoutBtn) {
        checkoutBtn.addEventListener('click', function() {
          // Track Facebook Pixel
          fbq('track', 'InitiateCheckout', {
            content_name: 'cashnopix',
            value: 197.0,
            currency: 'BRL'
          });
          
          // Redirect to checkout
          window.location.href = checkoutUrl;
        });
      }
    });
    </script>
</body>
</html>
